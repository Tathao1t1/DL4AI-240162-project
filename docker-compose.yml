services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: tensorfinance_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: ${MONGO_URL}
      MONGO_DB:  ${MONGO_DB:-tensorfinance}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    volumes:
      # Mount CSV data so pipeline writes are persisted on the host
      - ./clean-historical-data-2026:/app/clean-historical-data-2026
      - ./nasdaq-historical-data:/app/nasdaq-historical-data

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: tensorfinance_ui
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
